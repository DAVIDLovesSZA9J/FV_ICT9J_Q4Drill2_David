<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Q4 Drill 2</title>
    <style>
    * {
        font-family: 'Poppins';
    }

    body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-image: url(BG.jpg);
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        background-repeat: no-repeat;
        text-align: center;
    }

    .calc-container {
        background-color: #00000073;
        backdrop-filter: blur(3px);
        border-radius: 30px;
        padding: 30px;
        min-width: 450px;
        text-align: center;
        box-shadow: -2px -1px 13px 0px rgba(255, 255, 255, 0.356);
        -webkit-box-shadow: -2px -1px 13px 0px rgba(255, 255, 255, 0.454);
        -moz-box-shadow: -2px -1px 13px 0px rgba(255, 255, 255, 0.75);
        transition: transform 0.3s ease;

        /* Box shadow - generated from CSS shadow generator. Citation in HTML file. */
    }

    .calc-container:hover {
        transform: translateY(-5px);
    }

    .calc-header h1 {
        color: white;
        padding-left: 30px;
        padding-right: 30px;
        margin-bottom: 15px;
        font-weight: 800;
        text-shadow: 1px 1px 5px rgba(255, 255, 255, 0.76);
    }

    .btn-display {
        background-color: #ffffff;
        border-radius: 30px;
        padding: 5px 25px;
        font-weight: bold;
        color: black;
        box-shadow: 1px 1px 5px rgba(255, 255, 255, 0.76);
    }

    #result1 {
        background-color: #ffffff;
        color: rgb(0, 0, 0);
        font-size: 2.5rem;
        padding: 5px 20px;
        border-radius: 10px;
        display: inline-block;
        margin-top: 20px;
        min-width: 100px;
        text-align: center;
        box-shadow: 1px 1px 5px rgba(255, 255, 255, 0.76);
    }

    p,
    label,
    summary {
        color: white;
    }

    label {
        padding-top: 5px;
    }

    summary {
        font-weight: 500;
        text-decoration: italic;
    }

    button {
        margin-top: 15px;
    }

    input {
        text-align: center;
    }

    #psnote {
        font-weight: 700;
    }
    </style>
</head>
<body>

<body>
    <div class="calc-container">
        <div class="calc-header">
            <h1 id="head1" class="m-0"></h1>
        </div>

        <details class="ontoggle">
            <summary><em>Instructions:</em></summary>
            <p id="instructions"></p>
        </details>

        <form>
            <label>Temperature in Celsius °:</label><br>
            <input type="number" id="num1" class="form-control-sm" placeholder="First Number"><br>

            <label>Enter 2nd Number:</label><br>
            <input type="number" id="num2" class="form-control-sm" placeholder="Second Number"><br>

            <button type="button" class="btn btn-light" onmouseover="product()">Calculate</button>
        </form>

        <div id="result1">?</div>
    </div>

    <script>
        var title = "Heat Index Checker";
        document.getElementById("head1").innerHTML = title;

        function HeatIndex() {
            let temp, humidity, HI, status;
            temp = parseFloat(ddocument.getElementById("temp").value);
            humidity = parseFloat(document.getElementById("humid").value);
            
            HI = temp + (0.33 * humidity) - 4;
            status = ""; 

            switch(true) {
                case(HI <= 27) :
                status = "Comfortable / Cool";
                break;

                case(HI <= 32) :
                status = "Warm";
                break;

                case(HI <= 37) :
                status = "Hot";
                break;

                case(HI <= 41) :
                status = "Very Hot / Caution";
                break;

                case(HI >= 42) :
                status = "Extreme Heat / Danger";
                break;

                case(HI < 0) :
                status = "Value cannot be determined."
                break;
            }
        }
    </script>
</body>
</html>
