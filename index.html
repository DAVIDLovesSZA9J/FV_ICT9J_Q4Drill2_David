<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Q4 Drill 2</title>

    <style>
        * {
            font-family: 'Poppins';
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Source for BG image cited in Line 4 */
            background-image: url(https://i.pinimg.com/1200x/38/ef/d3/38efd3ebafb2d79ff75c09c233a2f634.jpg);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            text-align: center;
        }

        .calc-container {
            background-color: #00000073;
            backdrop-filter: blur(3px);
            border-radius: 30px;
            padding: 30px;
            min-width: 450px;
            text-align: center;
            box-shadow: -2px -1px 13px rgba(255, 255, 255, 0.4);
            /* Box Shadow Generator (Cited in Line 2) */
            transition: transform 0.3s ease;
        }

        .calc-container:hover {
            transform: translateY(-5px);
        }

        .calc-header h1 {
            color: white;
            padding: 10px 30px 10px;
            font-weight: 800;
            text-shadow: 1px 1px 5px rgba(255, 255, 255, 0.76);
        }

        p,
        label,
        summary {
            color: white;
        }

        label {
            padding-top: 5px;
        }

        summary {
            font-weight: 600;
            text-decoration: italic;
        }

        button {
            margin-top: 15px;
        }

        input {
            text-align: center;
        }

        #psnote {
            font-weight: 700;
        }

        i {
            margin-bottom: 15px;
            font-size: 40px;
            color: rgb(255, 174, 81);
        }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 45px;
            background-color: #212529ae;
            color: white;
            text-align: center;
            line-height: 45px;
        }
    </style>
</head>

<body>
    <div class="calc-container">
        <div class="calc-header">
            <h1 id="head1" class="m-0"></h1>
        </div>

        <i class="fa-solid fa-sun"></i>

        <details class="ontoggle">
            <summary><em>Instructions:</em></summary>
            <p id="instructions"></p>
        </details>

        <form>
            <label>Temperature in Celsius (°C)</label><br>
            <input type="number" id="temp" class="form-control-sm" placeholder="Input temperature"><br>

            <label>Humidity (%)</label><br>
            <input type="number" id="humid" class="form-control-sm" placeholder="Input humidity"><br>

            <button type="button" class="btn btn-light" onclick="HeatIndex()">Check</button>
        </form>
    </div>

    <footer>
        <p>David | 9-Jade © 2026</p>
    </footer>

    <script>
        var title = "Heat Index Checker";
        document.getElementById("head1").innerHTML = title;

        // Formula from Mr. Santos
        function HeatIndex() {
            let temp = parseFloat(document.getElementById("temp").value);
            let humidity = parseFloat(document.getElementById("humid").value);

            let HI = temp + (0.33 * humidity) - 4;
            let status = "";

            switch (true) {
                // Displays this if the given input is a non-number value
                case (isNaN(temp) || isNaN(humidity)):
                    alert("Please enter valid numbers.");
                    return;

                case (HI <= 27):
                    status = "Comfortable / Cool";
                    break;

                case (HI <= 32):
                    status = "Warm";
                    break;

                case (HI <= 37):
                    status = "Hot";
                    break;

                case (HI <= 41):
                    status = "Very Hot / Caution";
                    break;

                default:
                    status = "Extreme Heat / Danger";
            }

            // Displays an alert showing the heat index (fixed to 1 decimal place) and its corresponding status
            alert("The heat index is " + HI.toFixed(1) + "°C and the condition is " + status);
        }

        document.getElementById("instructions").innerHTML =
            '1) Input the temperature (°C) and humidity (%) <br>  2) Click <span id="psnote">Check</span> to see the heat index and its status.';
    </script>
</body>
</html>
